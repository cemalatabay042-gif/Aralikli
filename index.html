<style>
:root{
  --bg: #F3F6F3;
  --bg-elev: #FFFFFF;
  --ink: #1F2E2B;
  --ink-soft: #5B6E68;
  --teal: #2F6659;
  --teal-deep: #1E453C;
  --sky: #5B8AA6;
  --sky-soft: #DCE9EE;
  --coral: #E0785A;
  --coral-soft: #FBE6DF;
  --sage-soft: #E4EEE3;
  --success: #6FA37A;
  --line: #DFE7E1;
  --shadow: 0 8px 24px rgba(31,46,43,0.08);
  --radius: 20px;
  --radius-sm: 12px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0; padding:0; height:100%;}
body{
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  overscroll-behavior-y: none;
}
h1,h2,h3,.display{
  font-family: 'Fraunces', serif;
  letter-spacing: -0.01em;
}
button{ font-family: inherit; cursor: pointer; }
input,select,textarea{ font-family: inherit; }

#app{
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  padding-bottom: 84px;
}

/* ---------- Onboarding ---------- */
#onboarding{
  position: fixed; inset:0; z-index: 100;
  background: linear-gradient(160deg, #EAF2EA 0%, #DCE9EE 100%);
  display:flex; flex-direction:column;
  max-width:480px; margin:0 auto;
}
.ob-slide{ display:none; flex:1; flex-direction:column; padding: 40px 28px 28px; }
.ob-slide.active{ display:flex; }
.ob-icon{ font-size:56px; margin-bottom: 20px; }
.ob-slide h1{ font-size: 30px; color: var(--teal-deep); margin: 0 0 12px; line-height:1.15;}
.ob-slide p{ font-size: 15.5px; color: var(--ink-soft); line-height:1.6; margin:0;}
.ob-dots{ display:flex; gap:8px; justify-content:center; margin: 18px 0;}
.ob-dot{ width:8px; height:8px; border-radius:50%; background: rgba(47,102,89,0.2); }
.ob-dot.on{ background: var(--teal); width:22px; border-radius:5px; transition:.25s;}
.ob-nav{ padding: 0 28px 34px; display:flex; gap:10px; }
.btn{
  border:none; border-radius: 14px; padding: 15px 20px; font-weight:700; font-size:15px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary{ background: var(--teal); color:#fff; flex:1; box-shadow: var(--shadow);}
.btn-primary:active{ transform: scale(0.98); }
.btn-ghost{ background: transparent; color: var(--ink-soft); }
.btn-outline{ background:#fff; color: var(--teal); border: 1.5px solid var(--teal); flex:1; }
.btn-danger{ background: var(--coral-soft); color:#9B4223;}
.btn-sm{ padding: 9px 14px; font-size: 13px; border-radius: 10px;}

.health-card{
  background: rgba(255,255,255,0.85); border-radius: var(--radius); padding: 20px;
  border: 1px solid rgba(47,102,89,0.15); margin-top: 16px;
}
.health-card ul{ margin: 10px 0 0; padding-left: 18px; color: var(--ink-soft); font-size: 14px; line-height: 1.7;}
.checkline{ display:flex; align-items:flex-start; gap:10px; margin-top:16px; font-size:13.5px; color:var(--ink-soft);}
.checkline input{ margin-top:3px; width:18px; height:18px; accent-color: var(--teal);}

.form-scroll{ flex:1; overflow-y:auto; }
.field{ margin-bottom: 16px; }
.field label{ display:block; font-size: 13px; font-weight:600; color: var(--ink-soft); margin-bottom:6px; }
.field input, .field select{
  width:100%; padding: 13px 14px; border-radius: 12px; border: 1.5px solid var(--line);
  font-size: 15.5px; background:#fff; color: var(--ink);
}
.field input:focus, .field select:focus{ outline:none; border-color: var(--teal); }
.pill-group{ display:flex; flex-wrap:wrap; gap:8px; }
.pill{
  padding: 10px 14px; border-radius: 100px; border: 1.5px solid var(--line); background:#fff;
  font-size: 13.5px; font-weight:600; color: var(--ink-soft);
}
.pill.sel{ background: var(--teal); border-color: var(--teal); color:#fff; }

/* ---------- Top bar & Tabs ---------- */
.topbar{
  padding: 22px 20px 14px; display:flex; align-items:center; justify-content:space-between;
}
.topbar .brand{ font-size:20px; font-weight:600; color: var(--teal-deep); }
.topbar .streak-chip{
  display:flex; align-items:center; gap:6px; background:#fff; padding:7px 12px; border-radius:100px;
  font-size:13px; font-weight:700; color:var(--coral); box-shadow: var(--shadow);
}

.tabbar{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; background:#fff; border-top:1px solid var(--line);
  display:flex; padding: 8px 6px calc(8px + env(safe-area-inset-bottom)); z-index:50;
}
.tab-btn{
  flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:8px 2px; color: #9AAAA4; font-size:10.5px; font-weight:600;
}
.tab-btn svg{ width:22px; height:22px; }
.tab-btn.active{ color: var(--teal); }

.screen{ display:none; padding: 4px 20px 20px; animation: fadeIn .25s ease; }
.screen.active{ display:block; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

.card{ background: var(--bg-elev); border-radius: var(--radius); padding:20px; box-shadow: var(--shadow); margin-bottom:16px; }
.card h3{ font-size:15px; margin:0 0 12px; color: var(--teal-deep); }

/* ---------- Timer tab ---------- */
.protocol-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
.protocol-card{
  background:#fff; border: 1.5px solid var(--line); border-radius: 16px; padding:14px; text-align:left;
}
.protocol-card .p-name{ font-family:'Fraunces',serif; font-size:19px; font-weight:600; color:var(--teal-deep); }
.protocol-card .p-desc{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; line-height:1.4; }
.protocol-card.sel{ border-color: var(--teal); background: var(--sage-soft); }

.ring-wrap{ display:flex; flex-direction:column; align-items:center; padding: 10px 0 6px; }
.ring-time{ font-family:'Fraunces',serif; font-size:40px; font-weight:600; color:var(--teal-deep); letter-spacing:-1px;}
.ring-label{ font-size:13px; color:var(--ink-soft); margin-top:2px; }
.phase-banner{
  background: linear-gradient(120deg, var(--teal), var(--sky)); color:#fff; border-radius:16px;
  padding:16px 18px; margin-top:14px;
}
.phase-banner .p-title{ font-weight:700; font-size:15px; }
.phase-banner .p-body{ font-size:13px; opacity:0.92; margin-top:4px; line-height:1.5; }
.motivate-line{ text-align:center; font-size:13.5px; color: var(--teal); font-weight:600; margin-top:14px; min-height:18px;}

.timeline{ margin-top:18px; }
.tl-item{ display:flex; gap:12px; padding: 10px 0; border-bottom:1px solid var(--line); }
.tl-item:last-child{ border-bottom:none; }
.tl-h{ font-weight:700; font-size:13px; color:var(--teal); width:44px; flex-shrink:0; }
.tl-body .tl-t{ font-size:13.5px; font-weight:600; }
.tl-body .tl-d{ font-size:12px; color:var(--ink-soft); margin-top:2px; line-height:1.5;}
.tl-item.past .tl-t, .tl-item.past .tl-h{ color:#B8C4BE; }
.tl-item.current{ background: var(--sage-soft); border-radius:12px; padding:10px 10px; margin: 0 -10px; }

/* ---------- Water tab ---------- */
.water-progress{ text-align:center; }
.water-num{ font-family:'Fraunces',serif; font-size:34px; font-weight:600; color:var(--sky); }
.water-goal-txt{ color:var(--ink-soft); font-size:13px; }
.wbar{ height:14px; background:var(--sky-soft); border-radius:100px; margin-top:14px; overflow:hidden;}
.wbar-fill{ height:100%; background: linear-gradient(90deg, var(--sky), #7FB2C9); border-radius:100px; transition: width .3s;}
.quickadd-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:8px; margin-top:16px; }
.qa-btn{ background: var(--sky-soft); border:none; border-radius:12px; padding:12px 4px; font-size:12px; font-weight:700; color:var(--sky); }
.qa-btn:active{ transform: scale(0.95); }
.custom-water-row{ display:flex; gap:8px; margin-top:10px; }
.custom-water-row input{ flex:1; padding:11px 12px; border-radius:10px; border:1.5px solid var(--line); font-size:14px;}

.bar-chart{ display:flex; align-items:flex-end; gap:8px; height:110px; margin-top:6px;}
.bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
.bar-fill{ width:100%; border-radius:6px 6px 3px 3px; background: var(--sky); min-height:3px; }
.bar-lbl{ font-size:10px; color:var(--ink-soft); margin-top:5px; }

/* ---------- Nutrition tab ---------- */
.kcal-summary{ display:flex; align-items:center; gap:16px; }
.kcal-ring{ position:relative; width:88px; height:88px; flex-shrink:0; }
.macro-row{ flex:1; display:flex; flex-direction:column; gap:8px; }
.macro-line{ display:flex; align-items:center; gap:8px; font-size:12.5px; }
.macro-dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.macro-bar{ flex:1; height:6px; border-radius:100px; background:var(--line); overflow:hidden;}
.macro-bar-fill{ height:100%; border-radius:100px; }
.warn-banner{ border-radius:14px; padding:12px 14px; font-size:13px; font-weight:600; margin-top:12px; display:none; }
.warn-over{ background: var(--coral-soft); color:#9B4223; }
.warn-under{ background:#FFF3D6; color:#8A6600; }

.meal-block{ margin-bottom:14px; }
.meal-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.meal-head .m-name{ font-weight:700; font-size:14px; }
.meal-head .m-kcal{ font-size:12.5px; color:var(--ink-soft); }
.add-food-btn{ width:100%; border: 1.5px dashed var(--line); background:transparent; border-radius:12px; padding:10px; font-size:13px; font-weight:600; color: var(--teal); }
.food-row{ display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line); }
.food-row:last-child{ border-bottom:none; }
.food-row .f-name{ font-size:13.5px; font-weight:600; }
.food-row .f-meta{ font-size:11.5px; color:var(--ink-soft); }
.food-row .f-kcal{ font-size:13px; font-weight:700; color:var(--teal); }
.del-x{ background:none; border:none; color:#B8938A; font-size:18px; padding:0 4px; margin-left:6px;}

/* ---------- Modal / sheet ---------- */
.sheet-overlay{ position:fixed; inset:0; background:rgba(20,30,28,0.45); z-index:80; display:none; }
.sheet-overlay.show{ display:block; }
.sheet{
  position:fixed; left:50%; bottom:0; transform:translateX(-50%) translateY(100%); transition: transform .28s ease;
  width:100%; max-width:480px; background:#fff; border-radius: 22px 22px 0 0; z-index:81; max-height:86vh;
  display:flex; flex-direction:column; box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
}
.sheet.show{ transform:translateX(-50%) translateY(0); }
.sheet-handle{ width:38px; height:4px; background: var(--line); border-radius:100px; margin: 10px auto; }
.sheet-head{ padding: 0 20px 12px; display:flex; justify-content:space-between; align-items:center; }
.sheet-head h3{ margin:0; font-size:17px; }
.sheet-body{ padding: 0 20px 24px; overflow-y:auto; }
.search-box{ width:100%; padding:12px 14px; border-radius:12px; border:1.5px solid var(--line); font-size:14.5px; margin-bottom:10px;}
.cat-scroll{ display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:6px; }
.cat-chip{ flex-shrink:0; padding:7px 13px; border-radius:100px; background: var(--sage-soft); font-size:12px; font-weight:600; color:var(--teal-deep); border:none; white-space:nowrap;}
.cat-chip.sel{ background:var(--teal); color:#fff; }
.food-pick-row{ display:flex; justify-content:space-between; align-items:center; padding:11px 4px; border-bottom:1px solid var(--line); }
.food-pick-row .fp-name{ font-size:13.5px; font-weight:600; }
.food-pick-row .fp-meta{ font-size:11px; color:var(--ink-soft); }
.gram-input-wrap{ text-align:center; padding: 10px 0; }
.gram-portions{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:14px 0; }

/* ---------- Stats tab ---------- */
.stat-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
.stat-box{ background:#fff; border-radius:16px; padding:16px; box-shadow: var(--shadow); }
.stat-box .s-num{ font-family:'Fraunces',serif; font-size:26px; font-weight:600; color:var(--teal-deep); }
.stat-box .s-lbl{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
.badge-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:10px; margin-top:8px; }
.badge{ display:flex; flex-direction:column; align-items:center; gap:5px; opacity:0.32; }
.badge.earned{ opacity:1; }
.badge .b-icon{ width:48px; height:48px; border-radius:50%; background: var(--sage-soft); display:flex; align-items:center; justify-content:center; font-size:22px; }
.badge.earned .b-icon{ background: linear-gradient(135deg, var(--teal), var(--sky)); }
.badge .b-lbl{ font-size:9.5px; text-align:center; color:var(--ink-soft); font-weight:600; line-height:1.2;}

.weight-chart{ width:100%; height:120px; }
.weight-row{ display:flex; gap:10px; align-items:center; }
.weight-row input{ flex:1; padding:12px; border-radius:10px; border:1.5px solid var(--line); font-size:15px;}

/* Profile */
.profile-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line); font-size:14px;}
.profile-row .pr-lbl{ color:var(--ink-soft); }
.profile-row .pr-val{ font-weight:700; }

.toast{
  position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background: var(--teal-deep); color:#fff;
  padding:12px 20px; border-radius:100px; font-size:13.5px; font-weight:600; z-index:90; opacity:0; pointer-events:none;
  transition: opacity .25s, transform .25s; box-shadow: var(--shadow);
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

::-webkit-scrollbar{ display:none; }

/* ---------- Splash ---------- */
#splash{
  position:fixed; inset:0; z-index:200; max-width:480px; margin:0 auto;
  background: linear-gradient(160deg, #0A7E8C 0%, #1A223D 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: opacity .5s ease;
}
#splash img{ width:112px; height:112px; border-radius:26px; box-shadow: 0 14px 34px rgba(0,0,0,0.3); margin-bottom:20px; }
#splash .splash-brand{ color:rgba(255,255,255,0.75); font-family:'Fraunces',serif; font-size:12.5px; letter-spacing:3px; text-transform:uppercase; }
#splash .splash-app{ color:#fff; font-family:'Fraunces',serif; font-size:28px; font-weight:600; margin-top:8px; }
#splash.hide{ opacity:0; pointer-events:none; }
.brand-credit{ display:flex; align-items:center; justify-content:center; gap:8px; margin-top:6px; opacity:0.7; }
.brand-credit img{ width:20px; height:20px; border-radius:6px; }
.brand-credit span{ font-size:11.5px; color:var(--ink-soft); letter-spacing:0.5px; }
</style>

function getPhase(hoursElapsed){
  let current = PHASES[0];
  for(const p of PHASES){ if(hoursElapsed >= p.h) current = p; }
  return current;
}
function getNextPhase(hoursElapsed){
  for(const p of PHASES){ if(p.h > hoursElapsed) return p; }
  return null;
}

let STATE = defaultState();

function loadState(){

  }catch(e){ console.warn("state yüklenemedi", e); }

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); }

}

// ================= UTIL =================
function todayStr(d){ d = d || new Date(); return d.toISOString().slice(0,10); }
function pad(n){ return n.toString().padStart(2,"0"); }
function fmtHMS(ms){
  if(ms<0) ms=0;
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return `${pad(h)}:${pad(m)}:${pad(sec)}`;
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove("show"), 2600);
}
function openSheet(html){
  document.getElementById("sheetContent").innerHTML = html;
  document.getElementById("sheetOverlay").classList.add("show");
  requestAnimationFrame(()=> document.getElementById("sheet").classList.add("show"));
}
function closeSheet(){
  document.getElementById("sheet").classList.remove("show");
  document.getElementById("sheetOverlay").classList.remove("show");
}
document.getElementById("sheetOverlay").addEventListener("click", closeSheet);

function allFoods(){ return FOOD_DB.map(r=>({name:r[0],kcal:r[1],protein:r[2],fat:r[3],carb:r[4],cat:r[5],portionLabel:r[6],portionG:r[7]}))
  .concat(STATE.customFoods.map(c=>({...c, cat:"custom"}))); }

// ================= BMI / TDEE / SU HEDEFİ =================
function calcBMI(w,h){ const hm = h/100; return +(w/(hm*hm)).toFixed(1); }
function bmiLabel(bmi){
  if(bmi<18.5) return "Zayıf";
  if(bmi<25) return "Normal";
  if(bmi<30) return "Kilolu";
  return "Obez sınırında";
}
function calcTDEE(w,h,age,gender,activity){
  let bmr = gender==="male" ? (10*w + 6.25*h - 5*age + 5) : (10*w + 6.25*h - 5*age - 161);
  return Math.round(bmr * ACTIVITY_FACTORS[activity].factor);
}
function calcWaterGoal(w){ return Math.round((w*33)/50)*50; }

// ================= ONBOARDING =================
const OB_SLIDES = [
  {icon:"🌿", title:"Fasten'e Hoş Geldin", body:"Aralıklı oruç yolculuğunda seninle olacağız. Sayaç, su takibi, beslenme günlüğü ve daha fazlası burada."},

  {icon:"🔥", title:"Vücudunda Neler Oluyor?", body:"Oruç boyunca saat saat vücudunda gerçekleşen hormonal değişimleri ve hissedebileceklerini öğreneceksin."},
  {icon:"💧", title:"Su, Kilo ve Beslenme Takibi", body:"Günlük su hedefini takip et, haftalık kilonu kaydet, yediklerini öğün öğün not al. Hepsi tek yerde."}

        <ul>
          <li>Diyabet veya başka bir kronik hastalığın varsa</li>
          <li>Hamile veya emziriyorsan</li>
          <li>Yeme bozukluğu geçmişin varsa</li>
          <li>18 yaşından küçüksen</li>
        </ul>
        <p style="margin-top:10px; font-size:13.5px;">bu uygulamayı kullanmadan önce mutlaka bir doktora danış. Bu uygulama tıbbi tavsiye vermez, genel bilgilendirme amaçlıdır.</p>
      </div>
      <label class="checkline">
        <input type="checkbox" id="healthCheck">
        Okudum, anladım ve kendi sorumluluğumda devam ediyorum.
      </label>
    </div>
    <div class="ob-slide" data-idx="setup">
      <h1 style="font-size:24px;">Seni Tanıyalım</h1>
      <p style="margin-bottom:14px;">Bu bilgiler günlük kalori ve su hedefini hesaplamak için kullanılacak.</p>
      <div class="form-scroll">
        <div class="field"><label>Boy (cm)</label><input type="number" id="inHeight" placeholder="Örn. 170"></div>
        <div class="field"><label>Kilo (kg)</label><input type="number" id="inWeight" placeholder="Örn. 70"></div>
        <div class="field"><label>Yaş</label><input type="number" id="inAge" placeholder="Örn. 28"></div>
        <div class="field">
          <label>Cinsiyet</label>
          <div class="pill-group" id="genderGroup">
            <button class="pill sel" data-val="female">Kadın</button>
            <button class="pill" data-val="male">Erkek</button>
          </div>
        </div>
        <div class="field">
          <label>Günlük aktivite seviyen</label>
          <div class="pill-group" id="activityGroup">
            ${Object.entries(ACTIVITY_FACTORS).map(([k,v],i)=>`<button class="pill ${i===0?'sel':''}" data-val="${k}">${v.label}</button>`).join("")}
          </div>
        </div>
      </div>
    </div>
  `;
  const allSlides = ()=> Array.from(el.querySelectorAll(".ob-slide"));
  function showSlide(i){
    allSlides().forEach((s,idx)=> s.classList.toggle("active", idx===i));
    renderNav(i);
  }
  function renderNav(i){
    let nav = document.getElementById("obNav");
    if(nav) nav.remove();
    const total = allSlides().length;
    const wrap = document.createElement("div");
    wrap.id = "obNav";
    let dots = `<div class="ob-dots">${Array.from({length:total}).map((_,d)=>`<div class="ob-dot ${d===i?'on':''}"></div>`).join("")}</div>`;
    let isLast = i===total-1;
    let isHealth = allSlides()[i].dataset.idx==="intro-health";
    wrap.innerHTML = `${dots}<div class="ob-nav">
      ${i>0?'<button class="btn btn-ghost" id="obBack">Geri</button>':''}
      <button class="btn btn-primary" id="obNext">${isLast? "Uygulamayı Başlat":"Devam Et"}</button>

      if(isHealth && !document.getElementById("healthCheck").checked){
        toast("Devam etmek için kutucuğu işaretlemelisin");
        return;
      }
      if(isLast){ finishOnboarding(); return; }
      obIndex = i+1; showSlide(obIndex);
    };
    if(i>0) document.getElementById("obBack").onclick = ()=>{ obIndex = i-1; showSlide(obIndex); };
  }
  el.querySelectorAll("#genderGroup .pill").forEach(b=> b.onclick=()=>{
    el.querySelectorAll("#genderGroup .pill").forEach(x=>x.classList.remove("sel")); b.classList.add("sel");
  });
  el.querySelectorAll("#activityGroup .pill").forEach(b=> b.onclick=()=>{
    el.querySelectorAll("#activityGroup .pill").forEach(x=>x.classList.remove("sel")); b.classList.add("sel");

  showSlide(0);
}
function finishOnboarding(){
  const h = +document.getElementById("inHeight").value;
  const w = +document.getElementById("inWeight").value;
  const age = +document.getElementById("inAge").value;
  if(!h || !w || !age){ toast("Lütfen boy, kilo ve yaşını gir"); return; }
  const gender = document.querySelector("#genderGroup .pill.sel").dataset.val;
  const activity = document.querySelector("#activityGroup .pill.sel").dataset.val;
  STATE.profile.height=h; STATE.profile.weight=w; STATE.profile.age=age;
  STATE.profile.gender=gender; STATE.profile.activity=activity;
  STATE.profile.bmi = calcBMI(w,h);
  STATE.profile.tdee = calcTDEE(w,h,age,gender,activity);
  STATE.profile.waterGoalMl = calcWaterGoal(w);
  STATE.weightLog.push({date:todayStr(), kg:w});
  STATE.setupDone = true; STATE.healthAckDone = true;
  saveState();
  document.getElementById("onboarding").style.display="none";
  document.getElementById("app").style.display="block";
  requestNotifPermission();
  renderAll();
  toast(`Hazırsın! Günlük kalori hedefin ~${STATE.profile.tdee} kcal`);
}

// ================= BİLDİRİMLER =================
function requestNotifPermission(){
  if("Notification" in window){
    try{ Notification.requestPermission(); }catch(e){}
  }
}
function notify(title, body){
  try{
    if("Notification" in window && Notification.permission==="granted"){
      new Notification(title, {body});
    }
  }catch(e){}
  toast(body);
}

// ================= TABS =================
function initTabs(){
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
      document.getElementById("screen-"+btn.dataset.tab).classList.add("active");
      renderScreen(btn.dataset.tab);
    });
  });
}
function renderScreen(tab){
  if(tab==="timer") renderTimer();
  if(tab==="water") renderWater();
  if(tab==="food") renderFood();
  if(tab==="stats") renderStats();
  if(tab==="profile") renderProfile();
}
function renderAll(){
  document.getElementById("streakChip").textContent = `🔥 ${STATE.streak} gün`;
  renderScreen("timer");
}

// ================= TIMER / ORUÇ =================
let motivateTimer = null;
function clearTimerIntervals(){
  if(window._timerInterval) clearInterval(window._timerInterval);
  if(window._scheduleInterval) clearInterval(window._scheduleInterval);
  if(motivateTimer) clearInterval(motivateTimer);
}
function renderTimer(){
  clearTimerIntervals();
  const el = document.getElementById("screen-timer");
  if(STATE.currentFast){ renderActiveTimer(); return; }
  if(STATE.scheduledFast){ renderScheduledWaiting(); return; }
  {
    el.innerHTML = `
      <div class="card">
        <h3>Bir protokol seç</h3>
        <div class="protocol-grid" id="protocolGrid">
          ${PROTOCOLS.map(p=>`
            <button class="protocol-card" data-id="${p.id}">
              <div class="p-name">${p.name}</div>
              <div class="p-desc">${p.desc}</div>
            </button>`).join("")}
        </div>
      </div>
      <div class="card">
        <h3>Oruç Evreleri Hakkında</h3>
        <div class="timeline">
          ${PHASES.map(p=>`
            <div class="tl-item">
              <div class="tl-h">${p.h}. sa</div>
              <div class="tl-body"><div class="tl-t">${p.title}</div><div class="tl-d">${p.body}</div></div>
            </div>`).join("")}
        </div>
      </div>

    document.querySelectorAll("#protocolGrid .protocol-card").forEach(c=>{
      c.onclick = ()=>{
        const proto = PROTOCOLS.find(p=>p.id===c.dataset.id);
        if(proto.id==="custom"){ openCustomProtocolSheet(); }
        else { openScheduleSheet(proto, proto.fastH*3600000); }
      };

}
function openScheduleSheet(proto, fastMs){
  const now = new Date();
  const nowVal = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  openSheet(`
    <div class="sheet-head"><h3>${proto.name} — Ne zaman başlasın?</h3><button class="btn btn-ghost btn-sm" onclick="closeSheet()">Kapat</button></div>
    <div class="sheet-body">
      <div class="pill-group" id="scheduleModeGroup">
        <button class="pill sel" data-mode="now">Hemen Başlat</button>
        <button class="pill" data-mode="later">Belirli Saatte Başlat</button>
      </div>
      <div class="field" id="scheduleTimeField" style="display:none; margin-top:14px;">
        <label>Başlangıç saati</label>
        <input type="time" id="scheduleTimeInput" value="${nowVal}">
        <div style="font-size:12px; color:var(--ink-soft); margin-top:6px;">Saat geçmişte kalırsa yarın aynı saatte başlatılır.</div>
      </div>
      <button class="btn btn-primary" style="width:100%; margin-top:18px;" id="scheduleConfirmBtn">Orucu Ayarla</button>
    </div>
  `);
  document.querySelectorAll("#scheduleModeGroup .pill").forEach(p=>{
    p.onclick = ()=>{
      document.querySelectorAll("#scheduleModeGroup .pill").forEach(x=>x.classList.remove("sel"));
      p.classList.add("sel");
      document.getElementById("scheduleTimeField").style.display = p.dataset.mode==="later" ? "block" : "none";
    };
  });
  document.getElementById("scheduleConfirmBtn").onclick = ()=>{
    const mode = document.querySelector("#scheduleModeGroup .pill.sel").dataset.mode;
    closeSheet();
    if(mode==="now"){ startFast(proto, fastMs); return; }
    const val = document.getElementById("scheduleTimeInput").value;
    if(!val){ toast("Lütfen bir saat seç"); return; }
    const [hh,mm] = val.split(":").map(Number);
    let start = new Date();
    start.setHours(hh, mm, 0, 0);
    if(start.getTime() <= Date.now()){ start.setDate(start.getDate()+1); }
    STATE.scheduledFast = { protocolId:proto.id, protocolName:proto.name, fastMs, startTs:start.getTime() };
    saveState();
    renderTimer();
    toast(`Orucun ${pad(hh)}:${pad(mm)} saatinde otomatik başlayacak`);
  };
}
function renderScheduledWaiting(){
  const el = document.getElementById("screen-timer");
  const sf = STATE.scheduledFast;
  const startDate = new Date(sf.startTs);
  el.innerHTML = `

function tickTimer(){
  if(!STATE.currentFast){ if(window._timerInterval) clearInterval(window._timerInterval); return; }
  const el = document.getElementById("ringTime");
  if(!el) return;
  const elapsed = Date.now() - STATE.currentFast.startTs;
  const remain = STATE.currentFast.fastMs - elapsed;
  const hoursElapsed = elapsed/3600000;
  if(remain<=0){
    completeFast();
    return;
  }
  document.getElementById("ringTime").textContent = fmtHMS(remain);
  document.getElementById("ringLabel").textContent = "kalan süre";
  const pct = Math.min(1, elapsed/STATE.currentFast.fastMs);
  const circumference = 552.9;
  document.getElementById("ringProgress").setAttribute("stroke-dashoffset", (circumference*(1-pct)).toFixed(1));

  const phase = getPhase(hoursElapsed);
  const next = getNextPhase(hoursElapsed);
  document.getElementById("phaseBanner").innerHTML = `
    <div class="p-title">${phase.title}</div>
    <div class="p-body">${phase.body}</div>
    ${next? `<div class="p-body" style="margin-top:8px; opacity:0.85;">Sıradaki evre ${next.h}. saatte: ${next.title}</div>`:''}
  `;
  const tl = document.getElementById("phaseTimeline");
  if(tl){
    const totalH = STATE.currentFast.fastMs/3600000;
    const relevant = PHASES.filter(p=> p.h <= Math.max(totalH, hoursElapsed+4));
    tl.innerHTML = relevant.map(p=>{
      let cls = p.h > hoursElapsed ? "" : (getPhase(hoursElapsed).h===p.h ? "current":"past");
      return `<div class="tl-item ${cls}"><div class="tl-h">${p.h}. sa</div><div class="tl-body"><div class="tl-t">${p.title}</div><div class="tl-d">${p.body}</div></div></div>`;
    }).join("");
  }
  // su hatırlatıcısı kontrolü (oruç sırasında her 90 dk)
  checkWaterReminder();
}

function endFast(completed){
  const f = STATE.currentFast;
  const durationH = +((Date.now()-f.startTs)/3600000).toFixed(1);
  STATE.completedFasts.push({startTs:f.startTs, endTs:Date.now(), durationH, protocolName:f.protocolName});
  updateStreak();
  STATE.currentFast = null;
  saveState();
  if(window._timerInterval) clearInterval(window._timerInterval);
  if(motivateTimer) clearInterval(motivateTimer);
  checkBadges();
  renderTimer();
  document.getElementById("streakChip").textContent = `🔥 ${STATE.streak} gün`;
  toast(completed? "Tebrikler, orucunu tamamladın! 🎉" : "Oruç sonlandırıldı, kendine iyi bak 💚");

function completeFast(){
  notify("Oruç tamamlandı! 🎉", `${STATE.currentFast.protocolName} orucunu başarıyla tamamladın.`);
  endFast(true);
}
function updateStreak(){
  const today = todayStr();
  if(STATE.lastCompletedDateStr === today) return; // aynı gün birden fazla sayılmasın
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = todayStr(y);
  if(STATE.lastCompletedDateStr === yesterday || STATE.lastCompletedDateStr===null){
    STATE.streak = (STATE.lastCompletedDateStr===null? 1 : STATE.streak+1);
  } else if(STATE.lastCompletedDateStr !== today){
    STATE.streak = 1;
  }
  STATE.lastCompletedDateStr = today;
}

function checkWaterReminder(){
  const today = todayStr();
  if(STATE.notifiedToday.date !== today){ STATE.notifiedToday = {date:today, waterHours:[], summaryDone:false, fastEndDone:false}; }
  const hour = new Date().getHours();
  const reminderHours = [9,11,13,15,17,19,21];
  if(reminderHours.includes(hour) && !STATE.notifiedToday.waterHours.includes(hour)){
    STATE.notifiedToday.waterHours.push(hour);

    notify("Su içme zamanı 💧", "Küçük bir bardak su, orucunu daha kolay sürdürmene yardımcı olur.");

function addWater(ml){
  const today = todayStr();
  STATE.water[today] = (STATE.water[today]||0) + ml;

  if(STATE.water[today] >= goal && STATE.lastWaterGoalDateStr !== today){
    STATE.waterGoalHitDays += 1;
    const y = new Date(); y.setDate(y.getDate()-1);
    STATE.waterStreak = (STATE.lastWaterGoalDateStr===todayStr(y))? STATE.waterStreak+1 : 1;
    STATE.lastWaterGoalDateStr = today;

  wrap.innerHTML = days.map(d=>{

}

}
function daysUntilNextWeightLog(){
  const last = new Date(STATE.weightLog[STATE.weightLog.length-1].date);
  const diffDays = (Date.now()-last.getTime())/86400000;
  return Math.max(0, Math.ceil(7-diffDays));
}
function addWeight(kg){
  STATE.weightLog.push({date:todayStr(), kg});
  STATE.profile.weight = kg;
  STATE.profile.bmi = calcBMI(kg, STATE.profile.height);
  STATE.profile.tdee = calcTDEE(kg, STATE.profile.height, STATE.profile.age, STATE.profile.gender, STATE.profile.activity);
  saveState();
  checkBadges();
  renderStats();
  toast("Kilon kaydedildi 👍");
}
function renderStats(){
  const el = document.getElementById("screen-stats");
  const totalFasts = STATE.completedFasts.length;
  const avgDur = totalFasts? (STATE.completedFasts.reduce((s,f)=>s+f.durationH,0)/totalFasts).toFixed(1) : 0;
  const canLog = canLogWeightThisWeek();
  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-box"><div class="s-num">${STATE.streak}</div><div class="s-lbl">Gün Seri 🔥</div></div>
      <div class="stat-box"><div class="s-num">${totalFasts}</div><div class="s-lbl">Tamamlanan Oruç</div></div>
      <div class="stat-box"><div class="s-num">${avgDur}sa</div><div class="s-lbl">Ortalama Süre</div></div>
      <div class="stat-box"><div class="s-num">${STATE.badgesEarned.length}/${BADGES.length}</div><div class="s-lbl">Rozet</div></div>
    </div>
    <div class="card">
      <h3>Kilo Takibi</h3>
      <svg class="weight-chart" viewBox="0 0 300 120" id="weightChartSvg"></svg>
      ${canLog? `
        <div class="weight-row">
          <input type="number" id="newWeightInput" placeholder="Bu haftaki kilon (kg)">
          <button class="btn btn-primary btn-sm" id="saveWeightBtn">Kaydet</button>
        </div>` : `<p style="font-size:12.5px; color:var(--ink-soft); margin-top:8px;">Bir sonraki kilo girişine ${daysUntilNextWeightLog()} gün kaldı — haftada bir kez kaydetmek gerçekçi takip için daha sağlıklı.</p>`}
    </div>
    <div class="card">
      <h3>Su Geçmişi (7 gün)</h3>
      <div class="bar-chart" id="waterBarChart2"></div>
    </div>
    <div class="card">
      <h3>Kalori Geçmişi (7 gün)</h3>
      <div class="bar-chart" id="kcalBarChart"></div>
    </div>
    <div class="card">
      <h3>Başarı Rozetleri</h3>
      <div class="badge-grid">
        ${BADGES.map(b=>{
          const earned = STATE.badgesEarned.includes(b.id);
          return `<div class="badge ${earned?'earned':''}"><div class="b-icon">${b.icon}</div><div class="b-lbl">${b.name}</div></div>`;
        }).join("")}
      </div>
    </div>
  `;
  if(canLog){
    document.getElementById("saveWeightBtn").onclick = ()=>{
      const v = +document.getElementById("newWeightInput").value;
      if(v>0) addWeight(v); else toast("Geçerli bir kilo gir");
    };
  }
  drawWeightChart();
  drawBarChartInto("waterBarChart2", (ds)=> STATE.water[ds]||0, STATE.profile.waterGoalMl, "#5B8AA6");
  drawBarChartInto("kcalBarChart", (ds)=> computeDayTotals(STATE.foodLog[ds]||{sabah:[],ogle:[],aksam:[],araogun:[]}).kcal, STATE.profile.tdee||2000, "#2F6659");
}
function drawBarChartInto(elId, getVal, goal, color){
  const wrap = document.getElementById(elId);
  if(!wrap) return;
  let days = [];
  for(let i=6;i>=0;i--){ const d = new Date(); d.setDate(d.getDate()-i); days.push(d); }
  wrap.innerHTML = days.map(d=>{
    const ds = todayStr(d);
    const v = getVal(ds);
    const pct = Math.max(3, Math.min(100, (v/goal)*100));
    const lbl = ["Pz","Pt","Sa","Ça","Pe","Cu","Ct"][d.getDay()];
    return `<div class="bar-col"><div class="bar-fill" style="height:${pct}%; background:${color}"></div><div class="bar-lbl">${lbl}</div></div>`;
  }).join("");
}
function drawWeightChart(){
  const svg = document.getElementById("weightChartSvg");
  if(!svg) return;
  const logs = STATE.weightLog.slice(-10);
  if(logs.length<2){ svg.innerHTML = `<text x="150" y="60" text-anchor="middle" fill="#9AAAA4" font-size="12">Yeterli veri birikince grafik burada görünecek</text>`; return; }
  const kgs = logs.map(l=>l.kg);
  const min = Math.min(...kgs)-1, max = Math.max(...kgs)+1;
  const pts = logs.map((l,i)=>{
    const x = 10 + i*(280/(logs.length-1));
    const y = 110 - ((l.kg-min)/(max-min))*100;
    return `${x},${y}`;
  });
  svg.innerHTML = `
    <polyline points="${pts.join(' ')}" fill="none" stroke="#2F6659" stroke-width="2.5"/>
    ${pts.map(p=>{ const [x,y]=p.split(","); return `<circle cx="${x}" cy="${y}" r="3.5" fill="#2F6659"/>`; }).join("")}
  `;
}

// ================= ROZETLER =================
function checkBadges(){
  BADGES.forEach(b=>{
    if(!STATE.badgesEarned.includes(b.id) && b.check(STATE)){
      STATE.badgesEarned.push(b.id);
      toast(`Yeni rozet kazandın: ${b.icon} ${b.name}`);
    }
  });
  saveState();
}

        </div>
      </div>
    `);

      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    };
  };
}
function openEditProfileSheet(){
  const p = STATE.profile;
  openSheet(`
    <div class="sheet-head"><h3>Bilgilerimi Güncelle</h3><button class="btn btn-ghost btn-sm" onclick="closeSheet()">Kapat</button></div>
    <div class="sheet-body">
      <div class="field"><label>Boy (cm)</label><input type="number" id="editHeight" value="${p.height}"></div>
      <div class="field"><label>Kilo (kg)</label><input type="number" id="editWeight" value="${p.weight}"></div>
      <div class="field"><label>Yaş</label><input type="number" id="editAge" value="${p.age}"></div>
      <div class="field">
        <label>Cinsiyet</label>
        <div class="pill-group" id="editGenderGroup">
          <button class="pill ${p.gender==='female'?'sel':''}" data-val="female">Kadın</button>
          <button class="pill ${p.gender==='male'?'sel':''}" data-val="male">Erkek</button>
        </div>
      </div>
      <div class="field">
        <label>Aktivite</label>
        <div class="pill-group" id="editActivityGroup">
          ${Object.entries(ACTIVITY_FACTORS).map(([k,v])=>`<button class="pill ${p.activity===k?'sel':''}" data-val="${k}">${v.label}</button>`).join("")}
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;" id="saveProfileBtn">Kaydet</button>
    </div>
  `);
  document.querySelectorAll("#editGenderGroup .pill").forEach(b=> b.onclick=()=>{
    document.querySelectorAll("#editGenderGroup .pill").forEach(x=>x.classList.remove("sel")); b.classList.add("sel");
  });
  document.querySelectorAll("#editActivityGroup .pill").forEach(b=> b.onclick=()=>{
    document.querySelectorAll("#editActivityGroup .pill").forEach(x=>x.classList.remove("sel")); b.classList.add("sel");
  });
  document.getElementById("saveProfileBtn").onclick = ()=>{
    const h = +document.getElementById("editHeight").value;
    const w = +document.getElementById("editWeight").value;
    const age = +document.getElementById("editAge").value;
    const gender = document.querySelector("#editGenderGroup .pill.sel").dataset.val;
    const activity = document.querySelector("#editActivityGroup .pill.sel").dataset.val;
    STATE.profile = {...STATE.profile, height:h, weight:w, age, gender, activity};
    STATE.profile.bmi = calcBMI(w,h);
    STATE.profile.tdee = calcTDEE(w,h,age,gender,activity);
    saveState();
    closeSheet(); renderProfile();
    toast("Profil güncellendi");
  };
}

// ================= GÜNLÜK ÖZET BİLDİRİMİ =================
function checkDailySummary(){
  const today = todayStr();
  if(STATE.notifiedToday.date !== today){ STATE.notifiedToday = {date:today, waterHours:[], summaryDone:false, fastEndDone:false}; }
  const now = new Date();
  const [hh,mm] = (STATE.profile.dailySummaryTime||"20:00").split(":").map(Number);
  if(now.getHours()===hh && now.getMinutes()===mm && !STATE.notifiedToday.summaryDone){
    STATE.notifiedToday.summaryDone = true; saveState();
    const totals = computeDayTotals(dayFoodLog());
    const water = STATE.water[today]||0;
    notify("Günlük Özet 📋", `Bugün: ${(water/1000).toFixed(1)}L su, ${Math.round(totals.kcal)} kcal aldın.`);
  }
}

// ================= SERVICE WORKER KAYDI (PWA için) =================
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(()=>{});
  });
}

// ================= INIT =================
window.addEventListener("load", ()=>{
  loadState();
  initTabs();
  if(STATE.setupDone){
    document.getElementById("onboarding").style.display="none";
    document.getElementById("app").style.display="block";
    renderAll();
  } else {
    renderOnboarding();
  }
  setInterval(()=>{ checkWaterReminder(); checkDailySummary(); }, 30000);
  setTimeout(()=>{
    const splash = document.getElementById("splash");
    splash.classList.add("hide");
    setTimeout(()=> splash.remove(), 550);
  }, 1500);
});

</script>
